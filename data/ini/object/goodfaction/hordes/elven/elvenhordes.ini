Object NoldorWarriorHorde

	; This is required for garrisoned objects - please put in all objects.
	ButtonImage 	= WOR_NoldorWarrior
	SelectPortrait  = UPNoldorWarriorPortrait


	Draw = W3DScriptedModelDraw ModuleTag_W3DModelDraw
	    DependencySharedModelFlags = EMOTION_ALERT EMOTION_MORALE_HIGH EMOTION_MORALE_LOW EMOTION_AFRAID EMOTION_COWER SELECTED EMOTION_TERROR
		DefaultModelConditionState
			Model = None ;InvisHrdeTmp5x2
		End
		ModelConditionState = HORDE_EMPTY
			Model = None
		End		
		ModelConditionState = WORLD_BUILDER
			Model = HordeTemp_5By2
		End
	End
	
	Side 		= Elves
	EditorSorting 	= UNIT
	EmotionRange 	= 240
	DisplayName 	= OBJECT:HordeNoldorWarrior
	DisplayNameStrategic = CONTROLBAR:LW_Unit_ElvenNoldorWarriorHorde
	DescriptionStrategic = CONTROLBAR:LW_ToolTip_ElvenNoldorWarriorHorde

	MaxSimultaneousOfType	= 3

	WeaponSet
		Conditions = None 
		Weapon 		= PRIMARY    	MirkwoodArcherMissileHordeRangefinder
		Weapon 		= TERTIARY	MirkwoodArcherMissileHordeRangefinderBombard
		AutoChooseSources = TERTIARY FROM_PLAYER FROM_SCRIPT
	End
	WeaponSet
		Conditions = WEAPONSET_TOGGLE_1
		Weapon 		= PRIMARY	NormalMeleeHordeRangefinder
		Weapon 		= TERTIARY	MirkwoodArcherMissileHordeRangefinderBombard
		AutoChooseSources = TERTIARY FROM_PLAYER FROM_SCRIPT
	End

	CommandSet = NoldorWarriorHordeCommandSet					; CHANGE THIS WHEN ElvenNoldorWarriorHordeCommandSet IS CREATED

	; *** AUDIO Parameters ***
	; Note: Dont put voice parameters here -- they will be ignored. Voice play requests
	; are always passed through to members


 	CrushableLevel = 0  ;What am I?:        0 = for infantry, 1 = for trees, 2 = general vehicles
	CrusherLevel = 0

	BuildCost = ELVEN_NOLDORWARRIOR_BUILDCOST			
	BuildTime = ELVEN_NOLDORWARRIOR_BUILDTIME			
	VisionRange = ELVEN_NOLDORWARRIOR_HORDE_VISION_RANGE
	ShroudClearingRange = ELVEN_NOLDORWARRIOR_HORDE_SHROUD_RANGE
	CommandPoints = 96
		
	FormationWidth = 2 ; Width it occupies in formations. Current choices are 1 or 2.
	FormationDepth = 1 ; Depth it occupies in formations. Current choices are 1 or 2.


	
    TransportSlotCount = TRANSPORTSLOTCOUNT_LARGE_HORDE			; 1
	KindOf = SELECTABLE CAN_ATTACK ATTACK_NEEDS_LINE_OF_SIGHT INFANTRY HORDE ARCHER MELEE_HORDE  ;UNATTACKABLE 
	
	Body = ImmortalBody ModuleTag_ImmortalBody
		MaxHealth = 1
	End
	
	Behavior = StancesBehavior ModuleTag_StancesBehavior
        StanceTemplate = FighterHorde
    End	

	Behavior = HordeAIUpdate ModuleTag_HordeAIUpdate
		AutoAcquireEnemiesWhenIdle 	= Yes ATTACK_BUILDINGS STEALTHED
		MoodAttackCheckRate        	= 500
		MaxCowerTime			= 5000
		MinCowerTime			= 3000
		CanAttackWhileContained    	= Yes  			; Can fire out of garrisoned building		
        AILuaEventsList				= InfantryFunctions	
        AttackPriority				= AttackPriority_Archer
	End

	Behavior = HordeContain ModuleTag_HordeContain
		ObjectStatusOfContained 	= 
		InitialPayload 			= NoldorWarrior 6
		Slots 				= 6
		PassengerFilter 		= NONE +INFANTRY
		ShowPips 			= No
		ThisFormationIsTheMainFormation = Yes			; Used to determine which armorset to use (and anything else we want!)
		RandomOffset 			= X:0 Y:0

		MeleeBehavior = Amoeba
		End

		; Positions for 6
		RankInfo = RankNumber:1 UnitType:NoldorWarrior 	Position:X:50 Y:7.5		Position:X:50 Y:-7.5		Position:X:50 Y:25		Position:X:50 Y:-25		Position:X:50 Y:42.5		Position:X:50 Y:-42.5
		;RankInfo = RankNumber:2 UnitType:NoldorWarrior Position:X:30 Y:0 Leader 1 0	Position:X:30 Y:20 Leader 1 1	Position:X:30 Y:-20 Leader 1 2	Position:X:30 Y:40 Leader 1 3	Position:X:30 Y:-40 Leader 1 4
		
		RanksToReleaseWhenAttacking = 1 

		MeleeAttackLeashDistance 	= 1		; How far the hordes can move from the center of the horde when melee attacking.				
		BackUpMinDelayTime		= 1		; The minimum amount of time to delay before backing up
		BackUpMaxDelayTime		= 3000		; The maximum amount of time to delay before backing up
		BackUpMinDistance		= 1		; The minimum number of cells to backup
		BackUpMaxDistance		= 3		; The maximum number of cells to backup
		BackupPercentage		= 80%		; The amount of chance that a unit will back up.
	End
	
	Behavior = StealthUpdate StealthUpdateModuleTag
		StealthDelay					= 500         			; msec
		FriendlyOpacityMin				= STEALTH_FRIENDLY_OPACITY_MIN
		FriendlyOpacityMax				= STEALTH_FRIENDLY_OPACITY_MAX
		PulseFrequency					= 750   			; msec
		StealthForbiddenConditions			= AWAY_FROM_TREES ATTACKING
		OrderIdleEnemiesToAttackMeUponReveal		= Yes
		DetectedByAnyoneRange				= 120
		RevealWeaponSets				= CLOSE_RANGE CONTESTING_BUILDING
	End

	Behavior = PhysicsBehavior ModuleTag_PhysicsBehavior
		GravityMult = 1.0
	End
	
 	Behavior = EmotionTrackerUpdate	Module_EmotionTracker
		TauntAndPointDistance		=	INFANTRY_TAUNT_POINT_RADIUS		; max distance to taunted/pointed objet
		TauntAndPointUpdateDelay	=	1000					; how often scan (milliseconds)
		TauntAndPointExcluded		=	NONE
		; AfraidOf			=	NONE +ElvenEagle +RohanTreeBerd +RohanEntFir +RohanEntAsh +RohanEntBirch +MordorCaveTroll +MordorMountainTroll +MordorDrummerTroll +MordorFellBeast +MordorWitchKingOnFellBeast +MordorMumakil;Must be SCARY kindof as well.
		; AlwaysAfraidOf			=	NONE +MordorBalrog +RohanOathbreaker +MordorSauron ;+MordorWitchKing +MordorWitchKingOnFellBeast
 		PointAt				=	NONE +MordorFellBeast +MordorWitchKingOnFellBeast +ElvenEagle
		HeroScanDistance		=	150
		FearScanDistance		=	INFANTRY_FEAR_SCAN_RADIUS

		AddEmotion	=	Terror_Base
		AddEmotion	=	Doom_Base
		AddEmotion	=   	BraceForBeingCrushed_Base
		AddEmotion	=	UncontrollableFear_Base
		AddEmotion	=	FearIdle_Base
		AddEmotion	=	FearBusy_Base
		AddEmotion	=	Point_Base
		AddEmotion	=	Taunt_Base	
		AddEmotion	=	CheerIdle_Base
		AddEmotion	=	CheerBusy_Base
		AddEmotion	=	HeroCheerIdle_Base
		AddEmotion	=	HeroCheerBusy_Base
		AddEmotion	=	Alert_Base
	End			

	Behavior = ProductionUpdate ProductionUpdateModuleTag
		GiveNoXP = Yes
	End

	Behavior = StatusBitsUpgrade ModuleTag_ProductionLegality2
		TriggeredBy = Upgrade_ElvenForgedBlades
	End
	
	Behavior = StatusBitsUpgrade ModuleTag_ProductionLegality3
		TriggeredBy = Upgrade_ElvenSilverthornArrows
	End

	;//-------------------------FEARLESS UPGRADE--------------------------------------
	Behavior = AttributeModifierUpgrade ModuleTag_AMU
		TriggeredBy = Upgrade_MiniHordeLvl2
		AttributeModifier = FearlessForever
	End

	;//-------------------------BLESSING OF VALINOR--------------------------------------
	Behavior = UnpauseSpecialPowerUpgrade ModuleTag_Blessing
		SpecialPowerTemplate	= SpecialAbilityFakeLeadership
		TriggeredBy				= Upgrade_MiniHordeLvl2
	End
	Behavior = SpecialPowerModule ModuleTag_BlessingUpdate   
		SpecialPowerTemplate		= SpecialAbilityFakeLeadership
		UpdateModuleStartsAttack	= No
		StartsPaused				= Yes
	End	
	Behavior = AttributeModifierUpgrade ModuleTag_BlessingAttr
		TriggeredBy = Upgrade_MiniHordeLvl2
		AttributeModifier = NoldorBlessingOfValinorModifier
	End

	;//-------------------------WEAPON SONG AURA--------------------------------------
	Behavior = UnpauseSpecialPowerUpgrade ModuleTag_WeaponSongAura
		SpecialPowerTemplate	= SpecialAbilityFakeLeadership2
		TriggeredBy				= Upgrade_MiniHordeLvl5
	End
	
	Behavior = SpecialPowerModule ModuleTag_WeaponSongAuraUpdate   
		SpecialPowerTemplate		= SpecialAbilityFakeLeadership2
		UpdateModuleStartsAttack	= No
		StartsPaused				= Yes
	End	

	Behavior = AttributeModifierAuraUpdate ModuleTag_WeaponSongAuraAttr
		StartsActive	= No ;If no, requires upgrade to turn on.
		BonusName		= NoldorWeaponSongAura
		TriggeredBy		= Upgrade_MiniHordeLvl5
		RefreshDelay	= 2000
		Range			= 200
		AntiCategory	= BUFF
		ObjectFilter	= GENERIC_BUFF_RECIPIENT_OBJECT_FILTER
	End

